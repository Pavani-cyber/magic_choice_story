<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Magic Choice Stories</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="nav">
    <div class="nav-left">
      <a class="work" href="/worksheets.html">Worksheets</a>
    </div>
    <h1><i class="fa-solid fa-book-open"></i> &nbsp;Magic Choice Stories</h1>
    <div class="nav-right">
      <!-- login removed -->
       <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
    </div>
    <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  
  <!-- Mobile Menu -->
  <div class="mobile-menu hidden" id="mobileMenu">
    <a class="mobile-nav-link" href="/worksheets.html">Worksheets</a>
    <a class="mobile-nav-link" href="/workDone">Your Progress</a>

  </div>
  <p class="rainbow-animate">Choose a story and start your adventure!</p>

  <div class="story-selection">
    <!-- Cards will be inserted dynamically by index.js -->
  </div>
<div class="foot">
  <p class="footer"> &copy; --magic_choice_stories-- &nbsp; &nbsp; &nbsp; &nbsp; 2026</p>
</div>
  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      menu.classList.toggle('hidden');
    }

    // Close menu when a link is clicked
    document.querySelectorAll('.mobile-nav-link').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('mobileMenu').classList.add('hidden');
      });
    });
  </script>
  <script src="js/index.js"></script>
</body>
</html>
